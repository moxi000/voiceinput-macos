<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient - deep purple to blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3CE1"/>
      <stop offset="50%" style="stop-color:#4A5FE0"/>
      <stop offset="100%" style="stop-color:#2B8FED"/>
    </linearGradient>
    <!-- Microphone body gradient -->
    <linearGradient id="micGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E0E4F0"/>
    </linearGradient>
    <!-- Glow effect -->
    <radialGradient id="glowGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Sound wave gradient -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.3"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#1a1040" flood-opacity="0.4"/>
    </filter>
    <!-- Inner shadow for mic head -->
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
    </filter>
  </defs>

  <!-- Rounded square background (macOS style) -->
  <rect x="20" y="20" width="984" height="984" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Subtle top-left light reflection -->
  <rect x="20" y="20" width="984" height="984" rx="220" ry="220" fill="url(#glowGrad)"/>

  <!-- Subtle grid/texture pattern overlay -->
  <rect x="20" y="20" width="984" height="984" rx="220" ry="220" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Sound wave arcs - right side -->
  <path d="M 670 410 Q 740 512 670 614" fill="none" stroke="url(#waveGrad)" stroke-width="32" stroke-linecap="round" opacity="0.8"/>
  <path d="M 730 340 Q 830 512 730 684" fill="none" stroke="url(#waveGrad)" stroke-width="28" stroke-linecap="round" opacity="0.5"/>
  <path d="M 790 280 Q 920 512 790 744" fill="none" stroke="url(#waveGrad)" stroke-width="24" stroke-linecap="round" opacity="0.3"/>

  <!-- Sound wave arcs - left side -->
  <path d="M 354 410 Q 284 512 354 614" fill="none" stroke="url(#waveGrad)" stroke-width="32" stroke-linecap="round" opacity="0.8"/>
  <path d="M 294 340 Q 194 512 294 684" fill="none" stroke="url(#waveGrad)" stroke-width="28" stroke-linecap="round" opacity="0.5"/>
  <path d="M 234 280 Q 104 512 234 744" fill="none" stroke="url(#waveGrad)" stroke-width="24" stroke-linecap="round" opacity="0.3"/>

  <!-- Microphone group with shadow -->
  <g filter="url(#shadow)">
    <!-- Microphone stand/base -->
    <rect x="488" y="660" width="48" height="120" rx="10" fill="url(#micGrad)" opacity="0.95"/>
    <!-- Microphone base plate -->
    <rect x="430" y="760" width="164" height="36" rx="18" fill="url(#micGrad)" opacity="0.95"/>

    <!-- Microphone holder arc -->
    <path d="M 410 540 Q 410 660 512 660 Q 614 660 614 540" fill="none" stroke="url(#micGrad)" stroke-width="36" stroke-linecap="round" opacity="0.95"/>

    <!-- Microphone head (capsule shape) -->
    <rect x="432" y="280" width="160" height="280" rx="80" fill="url(#micGrad)"/>

    <!-- Microphone grille lines -->
    <line x1="458" y1="340" x2="566" y2="340" stroke="#C0C4D8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="458" y1="370" x2="566" y2="370" stroke="#C0C4D8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="458" y1="400" x2="566" y2="400" stroke="#C0C4D8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="458" y1="430" x2="566" y2="430" stroke="#C0C4D8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="458" y1="460" x2="566" y2="460" stroke="#C0C4D8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="460" y1="490" x2="564" y2="490" stroke="#C0C4D8" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

    <!-- Microphone highlight/reflection -->
    <rect x="460" y="295" width="40" height="180" rx="20" fill="white" opacity="0.25"/>
  </g>
</svg>
